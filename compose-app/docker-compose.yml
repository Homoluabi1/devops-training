version: '3.8'

services:

  webapp:
    build: .
    container_name: compose-webapp
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_VERSION=2.0
    restart: unless-stopped

  webserver:
    image: nginx:latest
    container_name: compose-nginx
    ports:
      - "80:80"
    restart: unless-stopped
  redis:
    image: redis:alpine
    container_name: compose-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
